<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    font-family: 'Montserrat', sans-serif;
    background: #000;
  }

  .slide {
    width: 1080px;
    height: 1350px;
    position: relative;
    overflow: hidden;
  }

  .bg-image {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background-image: url('./backgrounds/dubai_image_11.png');
    background-size: cover;
    background-position: center;
    filter: brightness(0.7) saturate(0.85);
  }

  .gradient-overlay {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%;
    height: 50%;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 50%, transparent 100%);
  }

  .content {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    padding: 0 70px 120px;
    z-index: 10;
  }

  .headline-small {
    font-size: 38px;
    font-weight: 700;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 2px;
    line-height: 1.2;
    margin-bottom: 8px;
  }

  .headline-big {
    font-size: 58px;
    font-weight: 700;
    color: #C9A06C;
    text-transform: uppercase;
    letter-spacing: 1px;
    line-height: 1.1;
    margin-bottom: 8px;
  }

  .headline-sub {
    font-size: 38px;
    font-weight: 700;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 2px;
    line-height: 1.2;
    opacity: 0.9;
  }

  .swipe-arrow {
    position: absolute;
    bottom: 45px;
    left: 50%;
    transform: translateX(-50%);
    width: 48px;
    height: 48px;
    border: 2px solid rgba(255,255,255,0.8);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }

  .swipe-arrow svg {
    width: 20px;
    height: 20px;
    fill: none;
    stroke: rgba(255,255,255,0.9);
    stroke-width: 2.5;
  }

</style>
</head>
<body>
<div class="slide">
  <div class="bg-image"></div>
  <div class="gradient-overlay"></div>
  <div class="content">
    <div class="headline-small">WHY GLOBAL FAMILY OFFICES</div>
    <div class="headline-big">ARE CHOOSING UAE</div>
    <div class="headline-sub">OVER LONDON & SINGAPORE</div>
  </div>
  <div class="swipe-arrow">
    <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
  </div>
</div>
</body>
</html>
