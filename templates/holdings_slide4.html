<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; font-family: 'Montserrat', sans-serif; background: #0a0a0a; }

  .slide {
    width: 1080px; height: 1080px; position: relative;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 45px;
  }

  .cta-text {
    font-size: 46px; font-weight: 800; color: #ffffff;
    text-transform: uppercase; text-align: center; letter-spacing: 3px; line-height: 1.35;
    padding: 0 90px;
  }

  .logo-center { width: 130px; }
  .brand-name {
    font-size: 30px; font-weight: 800; color: #C9A06C;
    text-transform: uppercase; letter-spacing: 8px; margin-top: -15px;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="cta-text">CONTACT US TO EXPLORE<br>THE RIGHT INVESTMENT<br>STRATEGY IN DUBAI</div>
  <img class="logo-center" src="./assets/logo_nucassa.png" alt="">
  <div class="brand-name">NUCASSA</div>
</div>
</body>
</html>
