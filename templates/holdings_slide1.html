<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,800;0,900;1,700;1,800;1,900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; font-family: 'Montserrat', sans-serif; background: #000; }

  .slide { width: 1080px; height: 1080px; position: relative; overflow: hidden; }

  .bg-image {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background-image: url('./backgrounds/burj_night_hd.png');
    background-size: cover; background-position: center top;
    filter: brightness(0.65) saturate(0.85);
  }

  .gradient-overlay {
    position: absolute; bottom: 0; left: 0; width: 100%; height: 55%;
    background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.5) 50%, transparent 100%);
  }

  .logo-watermark {
    position: absolute; top: 40px; left: 40px;
    width: 100px; opacity: 0.2;
  }

  .content {
    position: absolute; bottom: 0; left: 0; width: 100%;
    padding: 0 70px 130px; text-align: center; z-index: 10;
  }

  .headline-small {
    font-size: 36px; font-weight: 700; color: #ffffff;
    text-transform: uppercase; letter-spacing: 3px; line-height: 1.25; margin-bottom: 10px;
  }

  .headline-big {
    font-size: 56px; font-weight: 700; color: #C9A06C;
    text-transform: uppercase; letter-spacing: 1px; line-height: 1.1; margin-bottom: 10px;
  }

  .headline-sub {
    font-size: 34px; font-weight: 700; color: rgba(255,255,255,0.85);
    text-transform: uppercase; letter-spacing: 3px; line-height: 1.25;
  }

  .swipe-arrow {
    position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
    width: 50px; height: 50px; border: 2px solid rgba(255,255,255,0.7);
    border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10;
  }
  .swipe-arrow svg { width: 22px; height: 22px; fill: none; stroke: rgba(255,255,255,0.8); stroke-width: 2.5; }
</style>
</head>
<body>
<div class="slide">
  <div class="bg-image"></div>
  <div class="gradient-overlay"></div>
  <img class="logo-watermark" src="./assets/logo_nucassa.png" alt="">
  <div class="content">
    <div class="headline-small">DUBAI REAL ESTATE TRANSACTIONS HIT</div>
    <div class="headline-big">AED 252 BN IN Q1 2026</div>
    <div class="headline-sub">+31% GROWTH — SIGNALS STRONG MOMENTUM</div>
  </div>
  <div class="swipe-arrow">
    <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
  </div>
</div>
</body>
</html>
