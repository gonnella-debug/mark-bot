<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; font-family: 'Montserrat', sans-serif; background: #0a0a0a; }

  .slide { width: 1080px; height: 1080px; position: relative; overflow: hidden; }

  .stripe-bg {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: repeating-linear-gradient(-35deg, transparent, transparent 80px, rgba(255,255,255,0.018) 80px, rgba(255,255,255,0.018) 82px);
  }
  .streak1 {
    position: absolute; top: -20%; right: -10%; width: 60%; height: 140%;
    background: linear-gradient(-35deg, transparent 0%, rgba(255,255,255,0.012) 45%, rgba(255,255,255,0.035) 50%, rgba(255,255,255,0.012) 55%, transparent 100%);
  }
  .streak2 {
    position: absolute; top: -20%; right: 20%; width: 35%; height: 140%;
    background: linear-gradient(-35deg, transparent 0%, rgba(255,255,255,0.008) 45%, rgba(255,255,255,0.02) 50%, rgba(255,255,255,0.008) 55%, transparent 100%);
  }

  .content {
    position: relative; z-index: 10;
    padding: 110px 80px;
    height: 100%; display: flex; flex-direction: column;
    text-align: center;
  }

  .headline {
    font-size: 46px; font-weight: 900; color: #C9A06C;
    text-transform: uppercase; letter-spacing: 1px; line-height: 1.15;
    margin-bottom: 20px;
  }
  .headline-white {
    font-size: 46px; font-weight: 900; color: #ffffff;
    text-transform: uppercase; letter-spacing: 1px; line-height: 1.15;
    margin-bottom: 70px;
  }

  .stats { display: flex; flex-direction: column; gap: 45px; }

  .stat-text {
    font-size: 34px; font-weight: 700; color: #ffffff;
    text-transform: uppercase; letter-spacing: 1.5px; line-height: 1.4;
  }

  .bullet { color: #C9A06C; font-weight: 700; }
  .stat-highlight { color: #C9A06C; font-weight: 800; }

  .logo-bottom {
    position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
    width: 75px; opacity: 0.5;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="stripe-bg"></div>
  <div class="streak1"></div>
  <div class="streak2"></div>
  <div class="content">
    <div class="headline">INVESTOR ACTIVITY</div>
    <div class="headline-white">CONTINUES TO EXPAND</div>
    <div class="stats">
      <div class="stat-text"><span class="bullet">•</span> AED 173B ACROSS 57,744 DEALS <span class="stat-highlight">(+22%)</span></div>
      <div class="stat-text"><span class="bullet">•</span> 48,448 TOTAL INVESTORS <span class="stat-highlight">(+8%)</span></div>
      <div class="stat-text"><span class="bullet">•</span> 29,312 NEW INVESTORS <span class="stat-highlight">(+14%)</span></div>
      <div class="stat-text"><span class="bullet">•</span> FIRST-TIME BUYERS DOMINATE <span class="stat-highlight">60%+</span> OF TRANSACTIONS</div>
    </div>
  </div>
  <img class="logo-bottom" src="./assets/logo_nucassa.png" alt="">
</div>
</body>
</html>
