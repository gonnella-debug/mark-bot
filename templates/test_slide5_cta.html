<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    font-family: 'Montserrat', sans-serif;
    background: #0a0a0a;
  }

  .slide {
    width: 1080px;
    height: 1350px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 50px;
  }

  .cta-text {
    font-size: 44px;
    font-weight: 800;
    color: #ffffff;
    text-transform: uppercase;
    text-align: center;
    letter-spacing: 2px;
    line-height: 1.3;
    padding: 0 80px;
  }

  .logo-center {
    width: 140px;
  }

  .brand-name {
    font-size: 32px;
    font-weight: 800;
    color: #C9A06C;
    text-transform: uppercase;
    letter-spacing: 6px;
    margin-top: -20px;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="cta-text">CONTACT US TO EXPLORE<br>THE RIGHT INVESTMENT STRATEGY<br>IN DUBAI</div>
  <img class="logo-center" src="./assets/logo_nucassa.png" alt="">
  <div class="brand-name">NUCASSA</div>
</div>
</body>
</html>
